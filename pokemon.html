<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポケモン３択クイズ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #111; }
    #app { padding: 1.5rem 1rem; max-width: 520px; margin: 0 auto; }
    .score-bar { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 1rem; }
    .progress-bar-wrap { height: 4px; background: #e0e0e0; border-radius: 2px; margin-bottom: 1rem; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: #4a90e2; border-radius: 2px; transition: width 0.4s; }
    .pokemon-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem; text-align: center; margin-bottom: 1rem; }
    .pokemon-img { width: 160px; height: 160px; image-rendering: pixelated; }
    .pokemon-img.pop { animation: pop 0.4s ease; }
    @keyframes pop { 0%{transform:scale(0.7);opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1);opacity:1} }
    .question-text { font-size: 15px; font-weight: 500; margin: 0.5rem 0 0.2rem; }
    .hint-text { font-size: 13px; color: #888; min-height: 18px; }
    .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0.75rem; }
    .choice-btn { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 0.65rem 0.5rem; font-size: 14px; cursor: pointer; text-align: center; transition: background 0.12s; }
    .choice-btn:hover:not(:disabled) { background: #f0f0f0; }
    .choice-btn.correct { background: #e6f4ea; border-color: #4caf50; color: #2e7d32; font-weight: 500; }
    .choice-btn.wrong { background: #fdecea; border-color: #e53935; color: #c62828; }
    .choice-btn.reveal { background: #f5f5f5; color: #aaa; border-color: #e0e0e0; }
    .result-msg { text-align: center; font-size: 15px; font-weight: 500; min-height: 22px; margin-bottom: 0.5rem; }
    .next-hint { text-align: center; font-size: 12px; color: #aaa; min-height: 18px; }
    .final-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 2rem; text-align: center; }
    .final-score { font-size: 44px; font-weight: 500; margin: 0.5rem 0; }
    .final-msg { font-size: 15px; color: #888; margin: 0.75rem 0 1.5rem; }
    .restart-btn { background: #fff; border: 1px solid #ccc; border-radius: 8px; padding: 0.75rem 2rem; font-size: 15px; cursor: pointer; }
    .restart-btn:hover { background: #f0f0f0; }
  </style>
</head>
<body>

<div id="app">
  <div id="quiz-view">
    <div class="score-bar">
      <span id="progress-text">問題 1 / 10</span>
      <span id="score-text">スコア: 0 / 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
    </div>
    <div class="pokemon-card">
      <img id="poke-img" class="pokemon-img" src="" alt="ポケモン" />
      <div class="question-text">このポケモンはだれ？</div>
      <div class="hint-text" id="hint-text"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="result-msg" id="result-msg"></div>
    <div class="next-hint" id="next-hint"></div>
  </div>

  <div id="final-view" style="display:none">
    <div class="final-card">
      <div style="font-size:48px; margin-bottom:0.5rem">🏆</div>
      <div style="font-size:14px; color:#888">あなたのスコア</div>
      <div class="final-score" id="final-score"></div>
      <div class="final-msg" id="final-msg"></div>
      <button class="restart-btn" onclick="startQuiz()">もう一度あそぶ</button>
    </div>
  </div>
</div>

<script>
const ALL_POKEMON = [
  { id: 1,   name: "フシギダネ",  hint: "くさ / どく" },
  { id: 4,   name: "ヒトカゲ",   hint: "ほのお" },
  { id: 7,   name: "ゼニガメ",   hint: "みず" },
  { id: 25,  name: "ピカチュウ",  hint: "でんき" },
  { id: 39,  name: "プリン",     hint: "ノーマル / フェアリー" },
  { id: 52,  name: "ニャース",   hint: "ノーマル" },
  { id: 54,  name: "コダック",   hint: "みず" },
  { id: 63,  name: "ケーシィ",   hint: "エスパー" },
  { id: 66,  name: "ワンリキー",  hint: "かくとう" },
  { id: 74,  name: "イシツブテ",  hint: "いわ / じめん" },
  { id: 79,  name: "ヤドン",     hint: "みず / エスパー" },
  { id: 92,  name: "ゴース",     hint: "ゴースト / どく" },
  { id: 94,  name: "ゲンガー",   hint: "ゴースト / どく" },
  { id: 113, name: "ラッキー",   hint: "ノーマル" },
  { id: 129, name: "コイキング",  hint: "みず" },
  { id: 131, name: "ラプラス",   hint: "みず / こおり" },
  { id: 133, name: "イーブイ",   hint: "ノーマル" },
  { id: 143, name: "カビゴン",   hint: "ノーマル" },
  { id: 150, name: "ミュウツー",  hint: "エスパー" },
  { id: 151, name: "ミュウ",     hint: "エスパー" },
  { id: 152, name: "チコリータ",  hint: "くさ" },
  { id: 155, name: "ヒノアラシ",  hint: "ほのお" },
  { id: 158, name: "ワニノコ",   hint: "みず" },
  { id: 175, name: "トゲピー",   hint: "ノーマル" },
  { id: 196, name: "エーフィ",   hint: "エスパー" },
  { id: 197, name: "ブラッキー",  hint: "あく" },
  { id: 233, name: "ポリゴン２", hint: "ノーマル" },
  { id: 252, name: "キモリ",     hint: "くさ" },
  { id: 255, name: "アチャモ",   hint: "ほのお" },
  { id: 258, name: "ミズゴロウ",  hint: "みず" },
  { id: 280, name: "ラルトス",   hint: "エスパー / フェアリー" },
  { id: 385, name: "ジラーチ",   hint: "はがね / エスパー" },
  { id: 393, name: "ポッチャマ",  hint: "みず" },
  { id: 447, name: "リオル",     hint: "かくとう" },
  { id: 448, name: "ルカリオ",   hint: "かくとう / はがね" },
  { id: 495, name: "ツタージャ",  hint: "くさ" },
  { id: 498, name: "ポカブ",     hint: "ほのお" },
  { id: 501, name: "ミジュマル",  hint: "みず" },
  { id: 656, name: "ハリマロン",  hint: "くさ" },
  { id: 659, name: "フォッコ",   hint: "ほのお" },
];

const TOTAL = 10;
let questions = [], current = 0, score = 0, answered = false, timer = null;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  const pool = shuffle(ALL_POKEMON).slice(0, TOTAL);
  return pool.map(correct => {
    const others = shuffle(ALL_POKEMON.filter(p => p.id !== correct.id)).slice(0, 2);
    return { correct, choices: shuffle([correct, ...others]) };
  });
}

function startQuiz() {
  if (timer) clearTimeout(timer);
  questions = buildQuestions();
  current = 0; score = 0; answered = false;
  document.getElementById('final-view').style.display = 'none';
  document.getElementById('quiz-view').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  answered = false;
  if (timer) clearTimeout(timer);
  const q = questions[current];

  document.getElementById('progress-text').textContent = `問題 ${current + 1} / ${TOTAL}`;
  document.getElementById('score-text').textContent = `スコア: ${score} / ${current}`;
  document.getElementById('prog-bar').style.width = `${(current / TOTAL) * 100}%`;
  document.getElementById('hint-text').textContent = '';
  document.getElementById('result-msg').textContent = '';
  document.getElementById('next-hint').textContent = '';

  const img = document.getElementById('poke-img');
  img.className = 'pokemon-img';
  img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${q.correct.id}.png`;
  void img.offsetWidth;
  img.className = 'pokemon-img pop';

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = p.name;
    btn.onclick = () => answer(p, btn, q);
    choicesEl.appendChild(btn);
  });
}

function answer(chosen, btn, q) {
  if (answered) return;
  answered = true;
  document.getElementById('hint-text').textContent = 'タイプ: ' + q.correct.hint;

  const btns = document.querySelectorAll('.choice-btn');
  const isCorrect = chosen.id === q.correct.id;

  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === q.correct.name) b.className = 'choice-btn correct';
    else if (b === btn && !isCorrect) b.className = 'choice-btn wrong';
    else b.className = 'choice-btn reveal';
  });

  if (isCorrect) {
    score++;
    document.getElementById('result-msg').textContent = '⭕ せいかい！';
    document.getElementById('next-hint').textContent = '2秒後に次の問題へ…';
    timer = setTimeout(() => {
      current++;
      if (current >= TOTAL) showFinal();
      else renderQuestion();
    }, 2000);
  } else {
    document.getElementById('result-msg').textContent = `❌ ざんねん… 正解は「${q.correct.name}」`;
    document.getElementById('next-hint').textContent = 'ボタンを押して次へ進もう';
    const nextBtn = document.createElement('button');
    nextBtn.className = 'restart-btn';
    nextBtn.style.cssText = 'width:100%; margin-top:0.5rem;';
    nextBtn.textContent = current + 1 < TOTAL ? 'つぎへ →' : '結果をみる';
    nextBtn.onclick = () => {
      current++;
      if (current >= TOTAL) showFinal();
      else renderQuestion();
    };
    document.getElementById('choices').after(nextBtn);
  }
}

function showFinal() {
  document.getElementById('quiz-view').style.display = 'none';
  document.getElementById('final-view').style.display = 'block';
  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('final-score').textContent = `${score} / ${TOTAL}`;
  const pct = score / TOTAL;
  document.getElementById('final-msg').textContent =
    pct === 1   ? '満点！さすがポケモンマスター！🎖️' :
    pct >= 0.8  ? 'すごい！かなりのポケモン博士だね！' :
    pct >= 0.5  ? 'なかなか！もっと練習しよう！' :
                  'まだまだこれから！いっしょにおぼえよう！';
}

startQuiz();
</script>
</body>
</html>
